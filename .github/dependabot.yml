version: 2
updates:
  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Prague
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - composer

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:15'
      timezone: Europe/Prague
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
