name: Release

on:
    push:
        tags:
            - '[0-9]*.[0-9]*.[0-9]*'

permissions:
    contents: write

jobs:
    release:
        if: ${{ !contains(github.ref_name, '-rc') }}
        name: Create GitHub Release
        runs-on: ubuntu-latest

        steps:
            -   name: Create release
                uses: softprops/action-gh-release@v2
                with:
                    tag_name: ${{ github.ref_name }}
                    generate_release_notes: true
