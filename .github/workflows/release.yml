name: Release

on:
    push:
        tags:
            - 'v*'
        tags-ignore:
            - '*-rc*'

permissions:
    contents: write

jobs:
    release:
        name: Create GitHub Release
        runs-on: ubuntu-latest

        steps:
            -   name: Create release
                uses: softprops/action-gh-release@v2
                with:
                    tag_name: ${{ github.ref_name }}
                    generate_release_notes: true
